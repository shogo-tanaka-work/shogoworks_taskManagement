name: 開発タスク
description: リポジトリの開発タスクを作成します
title: "[開発タスク] "
labels: []
body:
  - type: dropdown
    id: category
    attributes:
      label: カテゴリ
      options:
        - "\U0001F527 機能追加"
        - "\U0001F41B バグ修正"
        - "\u2699\uFE0F CI/CD・インフラ"
        - "\U0001F4DD ドキュメント"
        - "\U0001F528 リファクタ"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - "\U0001F534 最優先"
        - "\U0001F7E1 通常"
        - "\U0001F535 いつか"
      default: 1
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: 期限
      description: 期限がある場合は記入してください（例: 2026-04-01）
      placeholder: YYYY-MM-DD

  - type: textarea
    id: details
    attributes:
      label: 詳細
      description: タスクの詳細を記入してください
    validations:
      required: false
