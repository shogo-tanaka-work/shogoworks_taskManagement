name: クライアント案件
description: クライアント案件のタスクを作成します
title: "[案件] "
labels: ["🏢 クライアント案件"]
body:
  - type: input
    id: client-name
    attributes:
      label: 顧客名
      placeholder: 株式会社○○
    validations:
      required: true

  - type: textarea
    id: project-summary
    attributes:
      label: 案件概要
      description: 案件の概要を記入してください
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: 期限
      placeholder: YYYY-MM-DD
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - 🔴 最優先
        - 🟡 通常
        - 🔵 いつか
      default: 1
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: ステータス
      options:
        - 提案中
        - 受注済み
        - 進行中
        - 納品済み
        - 検収待ち
      default: 0
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: その他メモ
    validations:
      required: false
